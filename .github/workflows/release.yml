name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Read CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          if [ -f CHANGELOG.md ]; then
            {
              echo 'body<<__CHANGELOG_EOF__'
              cat CHANGELOG.md
              echo
              echo '__CHANGELOG_EOF__'
            } >> "$GITHUB_OUTPUT"
          else
            echo 'body=Auto-built release.' >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: ${{ inputs.tag }}
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: ${{ inputs.prerelease }}

      - name: Rename installers (remove version from filename)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          cd dist/
          # Rename Windows setup exe (remove version)
          if ls HSPlanner-*_x64-setup.exe 1> /dev/null 2>&1; then
            mv HSPlanner-*_x64-setup.exe HSPlanner-x64-setup.exe
          fi
          # Rename macOS dmg (remove version)
          if ls HSPlanner-*_arch64.dmg 1> /dev/null 2>&1; then
            mv HSPlanner-*_arch64.dmg HSPlanner-x64.dmg
          fi
          # Rename Linux deb (remove version)
          if ls HSPlanner-*_amd64.deb 1> /dev/null 2>&1; then
            mv HSPlanner-*_amd64.deb HSPlanner-amd64.deb
          fi
          # Rename Linux rpm (remove version)
          if ls HSPlanner-*-1-x86_64.rpm 1> /dev/null 2>&1; then
            mv HSPlanner-*-1-x86_64.rpm HSPlanner-x86_64.rpm
          fi
          # Rename Linux AppImage (remove version)
          if ls HSPlanner-*_amd64.AppImage 1> /dev/null 2>&1; then
            mv HSPlanner-*_amd64.AppImage HSPlanner-amd64.AppImage
          fi

      - name: Upload renamed installers to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd dist/
          gh release upload ${{ inputs.tag }} \
            HSPlanner-x64-setup.exe \
            HSPlanner-x64.dmg \
            HSPlanner-amd64.deb \
            HSPlanner-x86_64.rpm \
            HSPlanner-amd64.AppImage \
            --clobber 2>/dev/null || true
