<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSPlanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      html, body { margin: 0; padding: 0; background: #0d0e12; overflow: hidden; }

      /* ---------- Boot splash ---------- */
      #boot{
        position:fixed;inset:0;z-index:9999;
        background:radial-gradient(ellipse at 50% 50%, #14151c 0%, #07080b 70%, #050609 100%);
        display:flex;align-items:center;justify-content:center;flex-direction:column;
        overflow:hidden;
      }
      /* boot-out is added at runtime via classList.add() in the script below */
      /*noinspection CssUnusedSymbol*/
      #boot.boot-out{ animation:bootOut 0.7s cubic-bezier(0.7,0,0.84,0) forwards; }
      #boot::before{
        /* faint vignette + grain */
        content:"";position:absolute;inset:0;pointer-events:none;
        background:radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.7) 100%);
      }
      #boot::after{
        /* sweep highlight */
        content:"";position:absolute;inset:0;pointer-events:none;
        background:linear-gradient(115deg, transparent 40%, rgba(232,217,107,0.06) 50%, transparent 60%);
        transform:translateX(-100%);
        animation:bootSweep 1.6s ease-out 0.6s 1 forwards;
      }
      @keyframes bootSweep{ to{ transform:translateX(100%);} }
      @keyframes bootOut{
        0%{opacity:1;transform:scale(1);filter:blur(0);}
        100%{opacity:0;transform:scale(1.06);filter:blur(6px);visibility:hidden;}
      }

      /* concentric rings */
      .boot-rings{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:560px;height:560px;}
      .boot-rings circle{fill:none;stroke:#c9a55a;stroke-opacity:0;transform-origin:280px 280px;}
      .boot-rings .r1{stroke-width:1;animation:ringIn 1.6s ease-out 0.1s forwards;}
      .boot-rings .r2{stroke-width:0.6;animation:ringIn 1.8s ease-out 0.25s forwards;}
      .boot-rings .r3{stroke-width:0.4;animation:ringIn 2.0s ease-out 0.4s forwards;}
      @keyframes ringIn{
        0%{stroke-opacity:0;transform:scale(0.6) rotate(0deg);}
        40%{stroke-opacity:0.4;}
        100%{stroke-opacity:0.12;transform:scale(1) rotate(60deg);}
      }

      /* ticks */
      .boot-ticks{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:340px;height:340px;animation:ticksSpin 18s linear infinite;}
      .boot-ticks line{stroke:#c9a55a;stroke-opacity:0.18;stroke-width:1;}
      @keyframes ticksSpin{ to{ transform:translate(-50%,-50%) rotate(360deg);} }

      /* logo */
      .boot-logo{position:relative;width:200px;height:200px;}
      .boot-logo svg{width:100%;height:100%;overflow:visible;}
      .boot-logo .ring{
        fill:none;stroke:#c9a55a;stroke-width:1.4;
        stroke-dasharray:200;stroke-dashoffset:200;
        animation:drawRing 1.4s cubic-bezier(0.65,0,0.35,1) 0.2s forwards;
      }
      @keyframes drawRing{ to{ stroke-dashoffset:0;} }

      .boot-logo .branch{
        fill:none;stroke:#c9a55a;stroke-width:2;stroke-linecap:round;
        stroke-dasharray:90;stroke-dashoffset:90;
      }
      .boot-logo .b1{animation:drawBranch 0.6s ease-out 0.9s forwards;}
      .boot-logo .b2{animation:drawBranch 0.6s ease-out 1.0s forwards;}
      .boot-logo .b3{animation:drawBranch 0.6s ease-out 1.1s forwards;}
      @keyframes drawBranch{ to{stroke-dashoffset:0;} }

      .boot-logo .node{
        fill:#0d0e12;stroke:#c9a55a;stroke-width:1.4;
        transform-origin:center;transform-box:fill-box;
        opacity:0;
      }
      .boot-logo .n1{animation:popNode 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.45s forwards;}
      .boot-logo .n2{animation:popNode 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.55s forwards;}
      .boot-logo .n3{animation:popNode 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.65s forwards;}
      @keyframes popNode{
        0%{opacity:0;transform:scale(0.2);}
        60%{opacity:1;transform:scale(1.4);filter:drop-shadow(0 0 6px rgba(232,217,107,0.9));}
        100%{opacity:1;transform:scale(1);filter:drop-shadow(0 0 3px rgba(232,217,107,0.4));}
      }

      .boot-logo .core{
        fill:url(#bootCore);stroke:#fff0c4;stroke-width:1;
        transform-origin:center;transform-box:fill-box;
        opacity:0;
      }
      .boot-logo .core-glow{
        fill:#e8d96b;opacity:0;
        transform-origin:center;transform-box:fill-box;
        filter:blur(8px);
      }
      .boot-logo .core{animation:coreBloom 1.0s cubic-bezier(0.34,1.56,0.64,1) 1.85s forwards;}
      .boot-logo .core-glow{animation:coreFlare 1.4s ease-out 1.85s forwards;}
      @keyframes coreBloom{
        0%{opacity:0;transform:rotate(45deg) scale(0.1);}
        60%{opacity:1;transform:rotate(45deg) scale(1.25);}
        100%{opacity:1;transform:rotate(45deg) scale(1);}
      }
      @keyframes coreFlare{
        0%{opacity:0;transform:scale(0.2);}
        30%{opacity:0.9;transform:scale(2.2);}
        100%{opacity:0.35;transform:scale(1.8);}
      }

      /* particle sparks emitted from center */
      .boot-spark{
        position:absolute;left:50%;top:50%;width:2px;height:2px;border-radius:50%;
        background:#fff0c4;box-shadow:0 0 6px #e8d96b;
        opacity:0;
      }
      .boot-spark:nth-child(1){animation:spark 1.2s ease-out 1.9s forwards;--ang:18deg;--d:160px;}
      .boot-spark:nth-child(2){animation:spark 1.3s ease-out 1.92s forwards;--ang:75deg;--d:200px;}
      .boot-spark:nth-child(3){animation:spark 1.1s ease-out 1.94s forwards;--ang:140deg;--d:170px;}
      .boot-spark:nth-child(4){animation:spark 1.4s ease-out 1.96s forwards;--ang:215deg;--d:210px;}
      .boot-spark:nth-child(5){animation:spark 1.2s ease-out 1.98s forwards;--ang:280deg;--d:175px;}
      .boot-spark:nth-child(6){animation:spark 1.3s ease-out 2.0s forwards;--ang:330deg;--d:195px;}
      @keyframes spark{
        0%{opacity:0;transform:translate(-50%,-50%) rotate(var(--ang)) translateX(0) scale(0.5);}
        20%{opacity:1;}
        100%{opacity:0;transform:translate(-50%,-50%) rotate(var(--ang)) translateX(var(--d)) scale(1);}
      }

      /* wordmark — absolute so .boot-logo can be the only flex item and stay viewport-centered with the rings */
      .boot-mark{
        position:absolute;
        top:calc(50% + 132px);
        left:50%;
        font-family:"JetBrains Mono",monospace;
        color:#e0b864;
        font-size:24px;
        letter-spacing:0.4em;
        text-indent:0.4em;
        opacity:0;
        transform:translate(-50%, 8px);
        animation:markInCentered 0.9s cubic-bezier(0.22,1,0.36,1) 2.0s forwards;
        text-shadow:0 0 12px rgba(232,217,107,0.4);
      }
      .boot-mark span{display:inline-block;}
      @keyframes markInCentered{
        0%{opacity:0;transform:translate(-50%, 8px);}
        100%{opacity:1;transform:translate(-50%, 0);}
      }

      @keyframes fadeUp{ from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }
      @keyframes fadeUpCentered{ from{opacity:0;transform:translate(-50%,4px);} to{opacity:1;transform:translate(-50%,0);} }

      /* status line + bar */
      .boot-status{
        position:absolute;bottom:48px;left:50%;transform:translateX(-50%);
        width:320px;text-align:center;
        opacity:0;animation:fadeUpCentered 0.6s ease-out 0.5s forwards;
      }
      .boot-status .lbl{
        font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:0.24em;
        color:#5a5448;text-transform:uppercase;margin-bottom:8px;
        display:flex;justify-content:space-between;align-items:baseline;gap:12px;
      }
      .boot-status .lbl .l{
        color:#8a8276;flex:1;text-align:left;
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      }
      .boot-status .lbl .r{
        color:#e0b864;font-weight:600;font-variant-numeric:tabular-nums;
        text-shadow:0 0 8px rgba(224,184,100,0.35);
      }
      .boot-bar{
        height:3px;background:#1c1d24;border:1px solid #2a2b35;border-radius:2px;overflow:hidden;
        position:relative;
        box-shadow:inset 0 1px 2px rgba(0,0,0,0.6);
      }
      .boot-bar > i{
        display:block;height:100%;width:0;
        background:linear-gradient(90deg,#8a6f3a,#e0b864,#fff0c4);
        box-shadow:0 0 10px rgba(232,217,107,0.7);
        transition:width 220ms cubic-bezier(0.65,0,0.35,1);
      }
      /* shimmer sweep over the fill */
      .boot-bar::after{
        content:"";position:absolute;inset:0;pointer-events:none;
        background:linear-gradient(90deg,transparent 0%,rgba(255,240,196,0.35) 50%,transparent 100%);
        transform:translateX(-100%);
        animation:bootShimmer 1.6s ease-in-out infinite;
      }
      @keyframes bootShimmer{
        0%{transform:translateX(-100%);}
        100%{transform:translateX(300%);}
      }

      /* tick marks under the bar */
      .boot-ticks-row{
        display:flex;justify-content:space-between;
        font-family:"JetBrains Mono",monospace;font-size:7px;letter-spacing:0.3em;
        color:#3a3528;text-transform:uppercase;
        margin-top:4px;
      }

      /* version mark */
      .boot-ver{
        position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
        font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:0.2em;
        color:#3a3528;text-transform:uppercase;
        opacity:0;animation:fadeUpCentered 0.6s ease-out 0.8s forwards;
      }

      /* app reveal — triggered by `body.boot-done` instead of a fixed delay */
      #root{
        opacity:0;transform:scale(0.985);filter:blur(4px);
        transition:opacity 0.7s cubic-bezier(0.22,1,0.36,1),
                   transform 0.7s cubic-bezier(0.22,1,0.36,1),
                   filter 0.7s cubic-bezier(0.22,1,0.36,1);
      }
      body.boot-done #root{ opacity:1;transform:scale(1);filter:blur(0); }

      @media (prefers-reduced-motion: reduce){
        #boot *,#boot::before,#boot::after{animation-duration:0.3s !important;animation-delay:0s !important;}
        .boot-bar::after{animation:none;}
        #root{transition:none;}
      }
    </style>
  </head>
  <body>
    <div id="boot" aria-hidden="true">
      <svg class="boot-rings" viewBox="0 0 560 560">
        <circle class="r1" cx="280" cy="280" r="240"></circle>
        <circle class="r2" cx="280" cy="280" r="180"></circle>
        <circle class="r3" cx="280" cy="280" r="120"></circle>
      </svg>
      <svg class="boot-ticks" viewBox="0 0 340 340">
        <g>
          <line x1="170" y1="6"  x2="170" y2="22"></line>
          <line x1="170" y1="318" x2="170" y2="334"></line>
          <line x1="6"   y1="170" x2="22"  y2="170"></line>
          <line x1="318" y1="170" x2="334" y2="170"></line>
          <line x1="50"  y1="50"  x2="62"  y2="62"></line>
          <line x1="290" y1="50"  x2="278" y2="62"></line>
          <line x1="50"  y1="290" x2="62"  y2="278"></line>
          <line x1="290" y1="290" x2="278" y2="278"></line>
        </g>
      </svg>

      <div class="boot-logo">
        <span class="boot-spark"></span>
        <span class="boot-spark"></span>
        <span class="boot-spark"></span>
        <span class="boot-spark"></span>
        <span class="boot-spark"></span>
        <span class="boot-spark"></span>
        <svg viewBox="0 0 32 32">
          <defs>
            <radialGradient id="bootCore" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#fff0c4"/>
              <stop offset="60%" stop-color="#e8d96b"/>
              <stop offset="100%" stop-color="#8a6f2a"/>
            </radialGradient>
          </defs>
          <circle class="ring" cx="16" cy="16" r="14.5"></circle>
          <path class="branch b1" d="M16 16 L16 4"></path>
          <path class="branch b2" d="M16 16 L26.4 22"></path>
          <path class="branch b3" d="M16 16 L5.6 22"></path>
          <circle class="node n1" cx="16"   cy="4"  r="2.2"></circle>
          <circle class="node n2" cx="26.4" cy="22" r="2.2"></circle>
          <circle class="node n3" cx="5.6"  cy="22" r="2.2"></circle>
          <circle class="core-glow" cx="16" cy="16" r="5"></circle>
          <g transform="translate(16 16) rotate(45)">
            <rect class="core" x="-4.4" y="-4.4" width="8.8" height="8.8"></rect>
          </g>
        </svg>
      </div>

      <div class="boot-mark"><span>H</span><span>S</span><span>P</span><span>L</span><span>A</span><span>N</span><span>N</span><span>E</span><span>R</span></div>

      <div class="boot-status">
        <div class="lbl">
          <span class="l">Initializing</span>
          <span class="r">0%</span>
        </div>
        <div class="boot-bar"><i></i></div>
        <div class="boot-ticks-row" aria-hidden="true">
          <span>00</span><span>25</span><span>50</span><span>75</span><span>FF</span>
        </div>
      </div>
      <div class="boot-ver">v0.7.0 &middot; STABLE</div>
    </div>
    <script>
      (function(){
        var bar = null, lbl = null, pctEl = null;
        function refs(){
          if (!bar)   bar   = document.querySelector('#boot .boot-bar > i');
          if (!lbl)   lbl   = document.querySelector('#boot .boot-status .lbl .l');
          if (!pctEl) pctEl = document.querySelector('#boot .boot-status .lbl .r');
        }
        window.__bootProgress = function(pct, status){
          refs();
          var p = Math.max(0, Math.min(100, pct || 0));
          if (bar)   bar.style.width = p + '%';
          if (pctEl) pctEl.textContent = Math.round(p) + '%';
          if (status && lbl) lbl.textContent = String(status);
        };
        window.__bootFinish = function(){
          var b = document.getElementById('boot');
          if (!b) return;
          document.body.classList.add('boot-done');
          b.classList.add('boot-out');
          setTimeout(function(){
            if (b && b.parentNode) b.parentNode.removeChild(b);
          }, 750);
        };
        // Safety fallback: if React never wires up (crash, blank import, etc.)
        // dismiss after 12 s so the splash can never trap the user forever.
        setTimeout(function(){
          if (document.getElementById('boot') && !document.body.classList.contains('boot-done')) {
            window.__bootFinish();
          }
        }, 12000);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
