      <circle cx="32" cy="8" r="4" fill="#1a1610" stroke="#fff0c4" stroke-width="1.6"/>
      <circle cx="52.8" cy="44" r="4" fill="#1a1610" stroke="#fff0c4" stroke-width="1.6"/>
